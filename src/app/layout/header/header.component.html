<section class="app-header">
    <div class="app-header-inner headerbar">

        <div class="d-lg-none d-xl-none float-left">
            <button mat-button myToggleOffcanvasNav class="md-button header-icon toggle-sidebar-btn">
                <em class="material-icons">menu</em>
            </button>
        </div>

        <div class="brand d-none d-lg-inline-block d-xl-inline-block">
            <h2><a [routerLink]="['/app/dashboard']">{{AppConfig.brand}}</a></h2>
        </div>

        <div class="top-nav-right">
            <ul class="list-unstyled float-right">
                <li>
                    <a style="position: relative;
                    left: -23px;
                    font-size: 14px;color: white;" class="md-button header-btn">
                        {{isCommunity}}
                    </a>
                </li>

                <li *ngIf="user.accountType === 'FREE'" class="upgrade">
                    |&nbsp; <span class="ba badge badge-pill"><a target="_blank"
                            href="mailto:contact@grizzly-api.com?subject=Consulting subscription&body=Please complete your message..."
                            style="cursor: pointer;text-decoration: none;color: white;background-color: #6c6123;">Upgrade to PROFESSIONAL</a></span>
                    &nbsp; |
                </li>

                <li>

                    <div *ngIf="firstName" class="md-button header-btn">
                        <span translate>header.welcome</span>&nbsp; {{ firstName }} &nbsp; {{ lastName }}
                    </div>
                </li>

                <li>
                    <button mat-button [matMenuTriggerFor]="menu" class="md-button header-btn"
                        style="cursor: pointer;text-decoration: none;color: white;margin-top: 12px;">
                        <span *ngIf="!isFr" class="flag-icon flag-icon-fr"> </span><span *ngIf="isFr"
                            class="flag-icon flag-icon-gb"></span>
                        {{selectedLanguage}} <mat-icon>keyboard_arrow_down</mat-icon></button>
                    <mat-menu #menu="matMenu">
                        <button mat-menu-item *ngIf="isFr" (click)="setLang('fr')"><span
                                class="flag-icon flag-icon-fr"></span> FR</button>
                        <button mat-menu-item *ngIf="!isFr" (click)="setLang('en')"><span
                                class="flag-icon flag-icon-gb"></span> EN</button>
                    </mat-menu>
                </li>

                <li>
                    <a mat-button class="md-button header-btn" [routerLink]="['/app/settings']"
                        style="cursor: pointer;text-decoration: none;color: white; margin-top: 12px;"><span
                            class="fa fa-cog fa-lg"></span>&nbsp;
                        <span translate>header.settings</span>
                    </a>
                </li>
                <li>
                    <a mat-button class="md-button header-btn" target="_blank" href="{{doc}}"
                        style="cursor: pointer;text-decoration: none;color: white; margin-top: 12px;"><span
                            class="fa fa-external-link fa-lg"></span>&nbsp;
                        <span translate>header.doc</span>
                    </a>
                </li>
                <li>
                    <a mat-button class="md-button header-btn" (click)="logout()"
                        style="cursor: pointer;text-decoration: none;color: white;margin-top: 12px;"><span
                            class="fa fa-sign-out fa-lg"></span>&nbsp;
                        <span translate>header.logout</span>
                    </a>
                </li>

            </ul>
        </div>

    </div>
</section>
